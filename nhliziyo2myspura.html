<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4KONKE</title>

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

    </style>
</head>
<body>
    <canvas id="myheart"></canvas>

    <script>
        const canvas = document.getElementById('myheart');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let t = 0;

        function heartFunction(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x, y };
        }

        function drawHeart() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < Math.PI * 2; i += 0.05) {
                let pos = heartFunction(i + t);

                let scale = Math.min(canvas.width, canvas.height) / 30;
            let x = canvas.width / 2 + pos.x * scale;
            let y = canvas.height / 2 - pos.y * scale;

            ctx.fillStyle = 'pink';
            ctx.shadowColor = 'pink';
            ctx.shadowBlur = 15;

            ctx.font = `${Math.max(10, scale * 0.8)}px Arial`;
            ctx.fillText('I LOVE YOU KONKE', x, y);

            }

            t += 0.005;
            requestAnimationFrame(drawHeart); 
        }
        drawHeart();
    </script>
</body>
</html>
